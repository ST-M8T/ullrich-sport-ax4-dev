openapi: 3.0.3
info:
  title: DHL Authentication API
  version: '1.3.0'
  description: >-
    The DHL Authentication API allows to generate access tokens for DHL Group
    APIs which use this service as their authentication provider.
security:
  - basicAuth: []
servers:
  - url: https://api-sandbox.dhl.com
    description: >-
      Please consult the documentation of the API you will access with the token
      generated by this Authentication API, the server should be the same.

tags:
  - name: Token
    externalDocs:
      url: https://developer.dhl.com/api-reference/dhl-authentication-api#get-started-section/
      description: You can find more information in developer.dhl.com    

paths:
  /auth/v1/token:
    post:
      tags:
        - Token
      summary: >-
        To generate an access token.
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: 
              - access_token
              - id_token
            example: access_token
            description: >-
              With with access_token an Opaque token will be generated. With
              id_token a JSON Web Token (JWT) will be generated. 
        - name: grant_type
          in: query
          required: true
          schema:
            type: string
            enum: 
              - client_credentials
            example: client_credentials
            description: >-
              For now, we only support the Client Credentials grant type of the
              OAuth framework. 
      responses:
        '200':
          description: The response is successfully return.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Success-200-Opaque'
                  - $ref: '#/components/schemas/Success-200-JWT'
            text/plain:
              schema:
                type: string
                example: jiONPuG6GYeF....XXXXXXXXXXX
        '400':
          description: Invalid response type or invalid grant type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error-400'
        '401':
          description: Access to the resource is not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error-401'
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    Success-200-Opaque:
      type: object
      properties:
        access_token:
          type: string
          example: jiONPuG6GYeF....XXXXXXXXXXX
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 119
    Success-200-JWT:
      type: object
      properties:
        access_token:
          type: string
          example: jiONPuG6GYeF....XXXXXXXXXXX
        id_token:
          type: string
          example: >-
            eyJraWQiOiJlZGEzZWRmMS1lNjQ3LWUxZDktOGM4NC......XXXXXXXXXXXXXXXXXXXX
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 119
    Error-400:
      type: object
      properties:
        status:
          type: integer
          example: 400
        title:
          type: string
          example: Bad Request
        detail:
          type: string
          example: Invalid response type.
    Error-401:
      type: object
      properties:
        status:
          type: integer
          example: 401
        title:
          type: string
          example: Unauthorized
        detail:
          type: string
          example: Access to the resource is not allowed.
